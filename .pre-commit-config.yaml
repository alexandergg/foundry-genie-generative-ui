repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
      - id: check-json
      - id: check-yaml
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
        exclude: ^package-lock\.json$
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/.*/agent/.*\.py$
      - id: ruff-format
        files: ^apps/.*/agent/.*\.py$
  - repo: local
    hooks:
      - id: agent-tests-controlled
        name: controlled agent unit tests
        entry: scripts/validate-agent.sh apps/controlled/agent --quick
        language: system
        pass_filenames: false
        files: ^apps/controlled/agent/.*\.py$
      - id: agent-tests-declarative
        name: declarative agent unit tests
        entry: scripts/validate-agent.sh apps/declarative/agent --quick
        language: system
        pass_filenames: false
        files: ^apps/declarative/agent/.*\.py$
      - id: agent-tests-open-ended
        name: open-ended agent unit tests
        entry: scripts/validate-agent.sh apps/open-ended/agent --quick
        language: system
        pass_filenames: false
        files: ^apps/open-ended/agent/.*\.py$
