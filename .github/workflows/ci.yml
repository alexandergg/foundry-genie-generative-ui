name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: npm ci
      - run: python -m pip install --upgrade pip && python -m pip install -e apps/agent
      - run: python -m py_compile apps/agent/main.py apps/agent/src/foundry_agent_client.py apps/agent/src/session_context.py apps/agent/src/visualization_mapper.py
      - run: npm run lint:web
      - run: npm run build:web
