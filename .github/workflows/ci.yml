name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            apps/controlled/agent/pyproject.toml
            apps/declarative/agent/pyproject.toml
            apps/open-ended/agent/pyproject.toml
      - run: npm ci
      - run: python -m pip install --upgrade pip && python -m pip install -e 'apps/controlled/agent[dev]' -e 'apps/declarative/agent[dev]' -e 'apps/open-ended/agent[dev]'
      - run: npm run validate:controlled-agent
      - run: npm run validate:declarative-agent
      - run: npm run validate:open-ended-agent
      - run: npm run validate:controlled-web
      - run: npm run validate:declarative-web
      - run: npm run validate:open-ended-web

  bicep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Bicep CLI
        run: az bicep install
      - name: Build infra/main.bicep
        run: az bicep build --file infra/main.bicep

  markdown-lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          globs: '**/*.md'
