name: link-check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lychee:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --exclude-mail --verbose './**/*.md'
          fail: false
