version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      next:
        patterns:
          - "next"
          - "eslint-config-next"
      copilotkit:
        patterns:
          - "@copilotkit/*"
      ag-ui:
        patterns:
          - "@ag-ui/*"
      types:
        patterns:
          - "@types/*"

  - package-ecosystem: "pip"
    directories:
      - "/apps/controlled/agent"
      - "/apps/declarative/agent"
      - "/apps/open-ended/agent"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    ignore:
      - dependency-name: "azure-ai-agentserver-core"
      - dependency-name: "azure-ai-agentserver-invocations"
