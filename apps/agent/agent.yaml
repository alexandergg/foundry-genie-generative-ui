# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: risk-exposure-ag-ui-hosted
protocols:
  - protocol: invocations
    version: 1.0.0
resources:
  cpu: "0.5"
  memory: 1Gi
environment_variables:
  - name: RISK_GENIE_AGENT_NAME
    value: "risk-exposure-genie-agent"
  - name: RISK_GENIE_AGENT_VERSION
    value: ""
  - name: RISK_GENIE_REQUIRE_HUMAN_DATA_APPROVAL
    value: "true"
  - name: RISK_GENIE_MCP_APPROVAL_ROUNDS
    value: "20"
  - name: RISK_GENIE_TRANSIENT_RESPONSE_RETRIES
    value: "2"
